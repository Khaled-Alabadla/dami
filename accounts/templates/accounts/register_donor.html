{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}تسجيل متبرع{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="auth-card">
        <h2 class="text-center mb-1">تسجيل متبرع جديد</h2>
        <p class="text-center text-muted small mb-4">أنشئ حسابك وابدأ في إنقاذ الأرواح</p>

        <form method="post" novalidate>
          {% csrf_token %}
          {{ form|crispy }}
          <button type="submit" class="btn btn-primary w-100 mt-3">
            <i class="bi bi-person-plus me-1"></i>إنشاء حساب
          </button>
        </form>

        <hr />
        <p class="text-center mb-0 small">
          لديك حساب بالفعل؟
          <a href="{% url 'login' %}" class="fw-bold">تسجيل الدخول</a>
        </p>
      </div>
    </div>
  </div>
{% endblock %}
