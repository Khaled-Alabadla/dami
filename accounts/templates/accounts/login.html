{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}تسجيل الدخول{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
      <div class="auth-card">
        <h2 class="text-center mb-1">تسجيل الدخول</h2>
        <p class="text-center text-muted small mb-4">أدخل بياناتك للوصول إلى حسابك</p>

        <form method="post" novalidate>
          {% csrf_token %}
          {{ form|crispy }}
          <button type="submit" class="btn btn-primary w-100 mt-3">
            <i class="bi bi-box-arrow-in-right me-1"></i>دخول
          </button>
        </form>

        <hr />
        <p class="text-center mb-0 small">
          ليس لديك حساب؟
          <a href="{% url 'register_donor' %}" class="fw-bold">تسجيل كمتبرع</a>
        </p>
      </div>
    </div>
  </div>
{% endblock %}
